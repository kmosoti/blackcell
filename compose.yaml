services:
  blackcell:
    build:
      context: .
      dockerfile: Containerfile
    image: blackcell:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - blackcell-uv-cache:/root/.cache/uv
    environment:
      UV_LINK_MODE: copy
    command: bash
    tty: true
    stdin_open: true

volumes:
  blackcell-uv-cache:
