services:
  blackcell:
    build:
      context: .
      dockerfile: Containerfile
      args:
        INSTALL_OPENCODE: "true"
    image: blackcell:dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - blackcell-uv-cache:/root/.cache/uv
      - blackcell-opencode:/root/.config/opencode
    environment:
      UV_LINK_MODE: copy
    command: bash
    tty: true
    stdin_open: true

volumes:
  blackcell-uv-cache:
  blackcell-opencode:
