name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - name: Verify architecture-consolidation evidence replay
        run: uv run python tools/architecture_consolidation_evidence.py verify --repo-root .
      - name: Verify current architecture-consolidation candidate
        if: github.event_name == 'pull_request' && github.head_ref == 'refactor/consolidation'
        run: uv run python tools/architecture_consolidation_evidence.py verify-current --repo-root .
      - name: Full test suite
        run: uv run python tools/run_pytest.py --cov=blackcell --cov-report=term-missing

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run ty check
