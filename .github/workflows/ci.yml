name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install Bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap
      - run: uv sync --locked --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - name: Architecture fitness
        run: >-
          uv run python tools/run_pytest.py
          tests/architecture/test_dependencies.py::test_concrete_runtime_construction_stays_at_approved_sites
          tests/architecture/test_dependencies.py::test_production_runtime_does_not_import_compatibility_or_experiments
          tests/architecture/test_dependencies.py::test_repository_runtime_composition_is_owned_by_bootstrap
          tests/architecture/test_dependencies.py::test_replay_slice_cannot_reach_live_models_or_actions
          -q --blackcell-require-all-pass
      - name: Full test suite
        run: uv run python tools/run_pytest.py --cov=blackcell --cov-report=term-missing

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run ty check
