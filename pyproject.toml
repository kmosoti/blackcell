[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "blackcell"
version = "0.1.0"
description = "Deterministic Linear planning materialization and GitHub echo verification"
readme = "README.md"
license = "MIT"
requires-python = "==3.14.6"
authors = [{ name = "Kennedy Mosoti" }]
dependencies = [
  "httpx>=0.28.1,<1",
  "platformdirs>=4.3.8,<5",
  "pydantic>=2.11.7,<3",
  "pydantic-settings>=2.10.1,<3",
  "rich>=14.0.0,<15",
  "typer>=0.16.0,<1",
]

[dependency-groups]
dev = [
  "pytest>=8.4.1,<9",
  "pytest-cov>=6.2.1,<7",
  "ruff>=0.12.1,<1",
  "ty>=0.0.1a14",
]

[project.scripts]
blackcell = "blackcell.cli.app:app"

[tool.hatch.build.targets.wheel]
packages = ["src/blackcell"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"

[tool.coverage.run]
branch = true
source = ["blackcell"]

[tool.coverage.report]
show_missing = true
skip_covered = true
