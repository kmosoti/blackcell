version: 4
project:
  key: BCP
  name: Blackcell
  description: Event-sourced control runtime for evidence-grounded LLM agents.

principles:
  - Keep one immutable evidence ledger and domain-scoped state projectors.
  - Treat models as replaceable proposal mechanisms without ambient tool authority.
  - Separate occurrence identity, idempotency, correlation, and causation.
  - Preserve conflicts, unknowns, effective time, and source provenance.
  - Make ContextFrame selections and omissions independently inspectable.
  - Gate every action through typed developer-authored policy.
  - Distinguish historical replay from counterfactual reruns.
  - Promote scientific claims only after held-out comparison with simple baselines.

phase_1:
  product_slice: repository-operator
  research_surface: operator-bench
  specifications:
    - BCP-0028
    - BCP-0029
    - BCP-0030
    - BCP-0031
    - BCP-0032
    - BCP-0033
    - BCP-0034

runtime_v1:
  status: active
  branch: agent/runtime-v1
  delivery:
    pull_requests: 1
    publish_each_node: true
    allow_force_push: false
    confidence_review: independent-subagent
  critical_path:
    - protocol-v2
    - gateway-decision
    - outcome-evaluation
    - transition-commit
    - closed-loop-integration
    - live-free-replay
    - product-delegation
    - durable-dag
    - operator-platform
    - release-evidence

active_surfaces:
  cli:
    - blackcell operator run --model recorded --repo .
    - blackcell operator state
    - blackcell operator context
    - blackcell operator replay
    - blackcell events list
    - blackcell bench list
    - blackcell bench run --condition structured --trials 1
  packages:
    - blackcell.kernel
    - blackcell.domains.repository
    - blackcell.context
    - blackcell.control
    - blackcell.models
    - blackcell.operator
    - blackcell.evaluation
    - blackcell.telemetry
    - blackcell.features.ingest_observation
    - blackcell.features.project_operational_state
    - blackcell.features.derive_signal_packet
    - blackcell.features.retrieve_evidence
    - blackcell.features.build_context
    - blackcell.features.solve_constraints
    - blackcell.features.authorize_action
    - blackcell.features.execute_affordance
    - blackcell.gateway
    - blackcell.workflows

compatibility_surfaces:
  status: retained-temporarily
  packages:
    - blackcell.world
    - blackcell.nesy
    - blackcell.harness
    - blackcell.latent
    - blackcell.agents
  note: These surfaces describe the July 6 prototype and do not define the current architecture.

verification:
  - uv run ruff format --check .
  - uv run ruff check .
  - uv run pytest --cov=blackcell --cov-report=term-missing
  - uv run ty check
  - uv run blackcell operator run --model recorded --repo .
  - uv run blackcell operator replay
  - uv run blackcell bench run --condition structured --trials 1
