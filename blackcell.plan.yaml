version: 4
project:
  key: BCP
  name: Blackcell
  description: Verifier-driven, project-scoped control runtime for evidence-grounded software work.

principles:
  - Keep one immutable evidence ledger and domain-scoped state projectors.
  - Treat models as replaceable proposal mechanisms without ambient tool authority.
  - Separate occurrence identity, idempotency, correlation, and causation.
  - Preserve conflicts, unknowns, effective time, and source provenance.
  - Make ContextFrame selections and omissions independently inspectable.
  - Gate every action through typed developer-authored policy.
  - Distinguish historical replay from counterfactual reruns.
  - Promote scientific claims only after held-out comparison with simple baselines.
  - Keep intent, prediction, review, verification, and human acceptance as distinct roles.
  - Extend the accepted runtime only when direct product evidence identifies a missing contract.

