version: 1
project:
  key: BCP
  name: BlackCell
  description: Typed project workflow tooling and agent orchestration.

global:
  acceptance_criteria:
    - Commands emit machine-readable JSON by default.
    - Contract changes are represented in typed Python models and tests.
  definition_of_ready:
    - Scope, context, and acceptance criteria are present.
    - Dependencies are declared by issue key.
  definition_of_done:
    - Unit tests cover success and failure paths.
    - CLI behavior is documented and verified.

pr_policy:
  require_issue_link: true
  required_checks:
    - pytest
    - ruff
  merge_strategy: squash

roadmaps:
  - key: RM-2026-CONTROL
    title: Control-plane facade
    epics:
      - EPIC-CONTROL-PLANE

epics:
  - key: EPIC-CONTROL-PLANE
    title: Contract-driven project orchestration
    roadmap: RM-2026-CONTROL
    milestones:
      - MS-CP-1

milestones:
  - key: MS-CP-1
    title: Contract and read-only validation
    epic: EPIC-CONTROL-PLANE
    target: 2026-Q3

issues:
  - key: BCP-0001
    title: Define the durable planning contract
    type: feature
    status: Done
    priority: P0
    complexity: 5
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    areas_of_responsibility:
      - contract/schema
    scope:
      - Add typed dataclasses and strict enum parsing.
      - Validate hierarchy, DAG dependencies, and inherited policy text.
    context:
      - blackcell.toml remains provider binding; blackcell.plan.yaml is repo-authored planning state.
    change_spec:
      - Add blackcell.control_plane contract models and validators.
    acceptance_criteria:
      - Invalid enum values fail during contract load.
      - Duplicate keys, missing nodes, and cycles are validation errors.
    definition_of_ready:
      - The first-slice contract fields are listed in the schema command.
    definition_of_done:
      - Agent context includes global and issue-local readiness and done criteria.

  - key: BCP-0002
    title: Guard GitHub GraphQL capabilities
    type: feature
    status: Done
    priority: P1
    complexity: 3
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0001
    areas_of_responsibility:
      - github/capabilities
    scope:
      - Cache GitHub public schema metadata under generated/cache.
      - Fail validation when referenced GraphQL capabilities are absent from the cache.
    context:
      - First slice is read-only; live GitHub mutations are out of scope.
    change_spec:
      - Add capability refresh and check commands.
    acceptance_criteria:
      - Required mutation, object, field, enum, and input names are checked against the cache.

  - key: BCP-0003
    title: Expose JSON-first control-plane CLI commands
    type: feature
    status: Done
    priority: P1
    complexity: 3
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0001
      - BCP-0002
    areas_of_responsibility:
      - cli
    scope:
      - Add validate, schema, capabilities, and agent-context commands.
    context:
      - Root output flags already define JSON, JSONL, and Rich modes.
    change_spec:
      - Wire control-plane commands into the Typer app.
    acceptance_criteria:
      - CLI validation errors remain JSON-readable by default.

  - key: BCP-0004
    title: Add guarded PR workflow
    type: feature
    status: Done
    priority: P0
    complexity: 8
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0001
      - BCP-0002
      - BCP-0003
    areas_of_responsibility:
      - cli
      - github/pull-requests
      - control-plane/cache
    scope:
      - Add a guarded state machine for issue-to-PR workflow progression.
      - Create or update a managed draft pull request and attach it to the GitHub Project.
      - Move the draft pull request to review only after local gates pass.
      - Keep PR identity and rendered digests in the generated SQLite cache.
    context:
      - BlackCell guides local git state but does not commit, push, merge, or close PRs.
      - The workflow is one issue to one pull request and uses BlackCell body markers for rediscovery.
    change_spec:
      - Add control-plane PR status, sync, and ready commands.
      - Add provider methods for GitHub pull request discovery, creation, updates, and ready transition.
      - Add deterministic PR body rendering, PR cache rows, and capability validation.
      - Document project and issue configuration plus the guarded PR workflow.
    acceptance_criteria:
      - PR commands emit JSON-first workflow state, actions, blockers, checks, and next commands.
      - Draft PR creation and update are idempotent and dry-run by default.
      - Ready transition requires status Review Required and passing configured checks.
      - Unit tests cover rendering, cache behavior, provider GraphQL calls, workflow gates, and CLI output.

  - key: BCP-0005
    title: Sync GitHub Project fields from contract
    type: feature
    status: Done
    priority: P0
    complexity: 5
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0001
      - BCP-0002
      - BCP-0003
      - BCP-0004
    areas_of_responsibility:
      - github/project-fields
      - control-plane/sync
    scope:
      - Ensure the GitHub Project has Status, Priority, Complexity, and Type fields.
      - Sync Project item field values from blackcell.plan.yaml for every managed issue.
      - Archive unmanaged GitHub issue items during whole-contract sync.
    context:
      - GitHub issue bodies and Project item attachment are already managed by sync.
      - The Project should be representative enough to scan the contract without reading YAML.
    change_spec:
      - Add provider methods for Project field reads, field creation, option updates, and item field values.
      - Extend control-plane sync with project field/value materialization.
      - Update docs, capability validation, and provider/unit tests.
    acceptance_criteria:
      - Whole-contract sync makes the GitHub Project rows match the contract issues.
      - Status, Priority, Complexity, and Type values are idempotently synced.
      - Missing single-select options are added without replacing existing option IDs.
      - Targeted issue sync does not archive unrelated Project items.

  - key: BCP-0006
    title: Add Vanguard CLI scope
    type: feature
    status: Done
    priority: P0
    complexity: 5
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0005
    areas_of_responsibility:
      - blackcell.plan.yaml
      - README.md
      - docs/vanguard.md
      - src/blackcell/cli/app.py
      - src/blackcell/vanguard/
      - tests/unit/test_vanguard.py
      - tests/unit/test_vanguard_cli.py
    scope:
      - Add blackcell vanguard commands inside the existing BlackCell CLI.
      - Emit and validate issue-bound ChangeSpecs without writing files.
      - Render deterministic, non-mutating QA command records and workflow templates.
    context:
      - Control-plane owns project state and GitHub projection.
      - Vanguard owns issue-bound ChangeSpec and QA scaffolding inside the same CLI.
      - Candidate invariants are evidence, not approved behavior.
      - Evidence gathering and review guidance must remain read-only.
      - QA planning is deterministic and non-mutating.
      - Vanguard must not be split into a blackcell-vanguard package or plugin.
    change_spec:
      - Add frozen, slot-backed Vanguard ChangeSpec, VerificationPlan, and ExecutorScope models.
      - Add blackcell vanguard changespec init and validate commands.
      - Add blackcell vanguard qa plan and templates render commands.
      - Document control-plane to Vanguard boundaries and ChangeSpec lifecycle diagrams.
    acceptance_criteria:
      - Vanguard commands emit machine-readable JSON by default.
      - changespec init consumes LocalControlPlane.render_agent_context and does not write files.
      - changespec validate reports typed validation messages for invalid ChangeSpecs.
      - qa plan emits deterministic command records without executing them.
      - templates render emits deterministic evidence, QA, and read-only review templates.
      - Reviewer verification rejects fix-mode, snapshot-update, commit, push, merge, and remote-mutating commands.

  - key: BCP-0007
    title: Harden Vanguard publishing workflow ergonomics
    type: bug
    status: Done
    priority: P1
    complexity: 3
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0006
    areas_of_responsibility:
      - README.md
      - docs/control-plane-configuration.md
      - docs/vanguard.md
      - src/blackcell/cli/app.py
      - src/blackcell/control_plane/pr.py
      - tests/unit/test_control_plane_cli.py
    scope:
      - Smooth the token, working-directory, and issue-sync prerequisites for the Vanguard PR workflow.
      - Make the operator path clearer when control-plane PR sync needs a materialized GitHub issue first.
      - Preserve the non-mutating Vanguard command boundary from BCP-0006.
    context:
      - Publishing BCP-0006 exposed setup friction around GH_TOKEN visibility in non-interactive shells.
      - Running uv run blackcell outside the repository can fail before BlackCell can emit a helpful repo-root error.
      - control-plane pr status correctly reports issue_not_synced, but the next operator step should be easier to follow.
      - PRs created outside control-plane can be adopted when BlackCell markers are present.
    change_spec:
      - Document permanent WSL token setup and repo-root invocation patterns.
      - Improve CLI/operator guidance for issue_not_synced and PR adoption prerequisites where practical.
      - Add regression coverage for the clarified workflow behavior.
    acceptance_criteria:
      - Operators can follow documented steps from fresh WSL shell to control-plane PR sync.
      - issue_not_synced guidance points to the targeted control-plane sync command.
      - Vanguard remains read-only and does not gain qa run, remote mutation, or agent-spawning behavior.
      - Tests cover any changed guidance or CLI output.

  - key: BCP-0008
    title: Render Codex CLI agent workflow artifacts
    type: feature
    status: Review Required
    priority: P0
    complexity: 5
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0007
    areas_of_responsibility:
      - blackcell.plan.yaml
      - docs/control-plane-configuration.md
      - docs/vanguard.md
      - src/blackcell/cli/app.py
      - src/blackcell/control_plane/agent_workflow.py
      - src/blackcell/control_plane/agent_rendering.py
      - src/blackcell/control_plane/codex_cli.py
      - tests/unit/test_agent_workflow.py
      - tests/unit/test_agent_workflow_cli.py
    scope:
      - Render repo-authored agent_workflow metadata into managed Codex CLI project artifacts.
      - Add dry-run diff, install, apply install, and drift-check commands for target codex-cli.
      - Preserve unmanaged Markdown outside BlackCell managed sections.
      - Treat Codex TOML files as whole-file managed and conflict on unmanaged existing TOML.
    context:
      - Control-plane owns the projection from blackcell.plan.yaml to local operational artifacts.
      - The implementation must not spawn Codex, call Codex APIs, or require Codex to be installed.
      - Rendered Codex agents are read-only and limited to evidence drafting or quality review.
      - Vanguard may consume workflow context but does not own or install Codex artifacts.
    change_spec:
      - Add agent workflow validation for rendered Codex CLI constraints and prohibited guidance.
      - Add deterministic TOML and Markdown artifact rendering with BlackCell markers and SHA-256 digests.
      - Add Codex CLI artifact comparison, dry-run install, apply install, and drift detection.
      - Document ownership, marker policy, conflict behavior, and drift workflow.
    acceptance_criteria:
      - agent-workflow commands require --target codex-cli for file projection.
      - Dry-run install reports create, update, noop, or conflict actions without writing.
      - Apply install writes only non-conflicting managed artifacts.
      - check-drift exits non-zero when any managed artifact differs, is missing, or conflicts.
      - Tests cover rendering, idempotence, conflict handling, Markdown preservation, validation, and CLI behavior.

  - key: BCP-0009
    title: Add GitHub App installation-token auth
    type: feature
    status: Todo
    priority: P0
    complexity: 8
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    areas_of_responsibility:
      - pyproject.toml
      - README.md
      - docs/control-plane-configuration.md
      - src/blackcell/github_app/
      - src/blackcell/cli/app.py
      - src/blackcell/providers/github.py
      - tests/unit/test_github_app.py
      - tests/unit/test_cli_output.py
    scope:
      - Add pyjwt[crypto] and pydantic-settings as the minimal GitHub App auth dependencies.
      - Load GitHub App settings from BLACKCELL_GITHUB_* environment variables.
      - Generate GitHub App JWTs from the app private key.
      - Discover or accept the installation ID for the configured repository.
      - Exchange app JWTs for short-lived installation access tokens.
      - Cache installation token metadata until near expiry without printing token material.
      - Add github-app CLI commands for JWT, installations, installation-token, and auth-check.
    context:
      - BlackCell control-plane sync acts as the installed app, not as an OAuth device-flow user.
      - Installation tokens expire after one hour and must be regenerated from a signed app JWT.
      - The app private key is operator-owned secret material and must stay outside the repository.
      - Token values must not be printed in CLI output.
      - GH_TOKEN and GITHUB_TOKEN remain the local development fallback until app auth is wired into the provider.
    change_spec:
      - Add blackcell.github_app settings and installation-token modules.
      - Use httpx for GitHub REST and GraphQL calls; do not add a GitHub SDK.
      - Add owner-only cache writes for installation-token metadata.
      - Add JSON-first CLI commands for inspection and auth preflight.
      - Document required app ID, private key, installation ID, and permission setup.
    acceptance_criteria:
      - Auth commands emit JSON-first sanitized status and never print bearer tokens.
      - auth-check validates repository lookup and configured Project V2 node access.
      - Installation tokens are regenerated before expiry.
      - Private key path/value handling is covered without committing secret material.
      - Tests cover JWT claim construction, installation-token exchange, cache expiry, and CLI output.

  - key: BCP-0010
    title: Wire GitHub provider auth strategies
    type: feature
    status: Backlog
    priority: P0
    complexity: 5
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0009
    areas_of_responsibility:
      - src/blackcell/providers/github.py
      - src/blackcell/github_app/
      - tests/unit/test_github_provider.py
      - tests/unit/test_github_app.py
      - docs/control-plane-configuration.md
    scope:
      - Add a small GitHub auth provider protocol that returns bearer-token headers.
      - Keep GH_TOKEN and GITHUB_TOKEN as explicit local/dev auth providers.
      - Add a GitHub App auth provider that supplies cached installation tokens.
      - Keep Projects, Issues, PRs, and GraphQL behavior inside the existing provider.
    context:
      - GitHub App auth is a credential adapter, not a replacement control-plane provider.
      - Existing BlackCell provider tests should remain focused on GitHub behavior, not SDK behavior.
    change_spec:
      - Introduce TokenEnvAuthProvider and GitHubAppAuthProvider.
      - Let GitHubProjectsProvider depend on an auth header source instead of reading every token source directly.
      - Preserve current env-token precedence unless BLACKCELL_GITHUB_AUTH_MODE=app is selected.
    acceptance_criteria:
      - Existing provider tests pass with env-token auth.
      - New tests cover app-token auth without hitting GitHub.
      - Missing-token errors tell operators which auth modes are configured and what is missing.

  - key: BCP-0011
    title: Plan optional GitHub App webhook verification
    type: feature
    status: Backlog
    priority: P2
    complexity: 3
    epic: EPIC-CONTROL-PLANE
    milestone: MS-CP-1
    depends_on:
      - BCP-0009
    areas_of_responsibility:
      - src/blackcell/github_app/
      - tests/unit/test_github_app.py
      - docs/control-plane-configuration.md
    scope:
      - Add stdlib HMAC verification for X-Hub-Signature-256.
      - Parse GitHub App webhook headers and installation routing metadata.
      - Keep any always-on web server dependency optional and out of the core CLI path.
    context:
      - BlackCell is currently a local CLI control-plane that syncs outward.
      - Webhook support changes the operating model and should remain optional.
    change_spec:
      - Add webhook signature helpers using hmac.compare_digest.
      - Add delivery dedupe planning against SQLite cache state.
      - Document optional github-app-web extra only when a server slice is accepted.
    acceptance_criteria:
      - Signature verification rejects missing, malformed, and mismatched signatures.
      - Valid signatures pass using the configured webhook secret.
      - No FastAPI, Uvicorn, queue, or Redis dependency is added to the core package.

native_automation:
  - key: native-validate-contract
    name: Validate contract before project sync
    trigger: pre-sync
    action: blackcell control-plane validate
    enabled: true
  - key: native-check-github-capabilities
    name: Check cached GitHub GraphQL capabilities
    trigger: pre-sync
    action: blackcell control-plane capabilities check
    enabled: true

agent_workflow:
  model: gpt-5.3-codex-spark
  workers:
    - key: contract-schema
      name: Contract/schema worker
      owns:
        - blackcell.plan.yaml
        - src/blackcell/control_plane/models.py
        - src/blackcell/control_plane/validation.py
      change_spec:
        - Own YAML schema and validators.
    - key: github-capability
      name: GitHub capability worker
      owns:
        - generated/cache/github_graphql_capabilities.json
        - src/blackcell/control_plane/capabilities.py
      change_spec:
        - Own docs/schema cache and reference validation.
    - key: cli
      name: CLI worker
      owns:
        - src/blackcell/cli/app.py
      change_spec:
        - Own command wiring and JSON/Rich output.
    - key: tests
      name: Test worker
      owns:
        - tests/unit/test_control_plane.py
        - tests/unit/test_control_plane_cli.py
      change_spec:
        - Own fixtures and validation scenarios.
  codex_cli:
    max_threads: 6
    max_depth: 1
    agents:
      - key: spark-evidence-drafter
        name: spark-evidence-drafter
        description: Drafts evidence summaries from repository context without approving behavior.
        developer_instructions: |
          You are the BlackCell Spark evidence drafter for this repository.
          Operate in read-only mode. Inspect repository-authored planning context and summarize evidence only.
          Do not approve behavior, draft fixes, edit files, run mutating commands, or request remote state changes.
          Return concise notes that separate observed facts from open questions.
        sandbox_mode: read-only
      - key: quality-reviewer
        name: quality-reviewer
        description: Reviews repository changes for contract, test, and documentation risks.
        developer_instructions: |
          You are the BlackCell quality reviewer for repository changes.
          Operate in read-only review mode. Inspect diffs, tests, docs, and contract context.
          Report defects, missing coverage, and contract risks. Do not enter fix mode, edit files, commit changes, push branches, merge pull requests, close issues, or run remote-mutating workflows.
          When suggesting verification, use non-mutating check commands only.
        sandbox_mode: read-only
