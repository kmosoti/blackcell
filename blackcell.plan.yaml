alpha:
  status: in-progress
  accepted_on: "2026-07-22"
  branch: feature/repository-review-alpha
  base_revision: f2965ab3d1fe18357aae58042345a6a22e171203
  plan: alpha.plan.yaml
  decision: docs/adr/0009-project-runtime-scope.md
  scope: docs/scope.md
  target: CLI-first project-scoped agentic framework with one authoritative daemon.
  active_work_package: A08
  daemon:
    process_model: foreground
    authority: state, scheduling, policy, providers, recovery, and ordered events
    supervision: operating-system service manager
  clients:
    - JSON-first CLI
    - PyRatatui TUI
    - Litestar web UI
  project_configuration:
    provider: Kernform
    supported_version: "0.1.0"
    wire_schema: kernform.command/v1
    transport: argv-only subprocess
  legacy_runtime:
    component: DailyOperatorV2Workflow
    disposition: migration-and-replay-evidence-only
    new_alpha_invocation_allowed: false
  github_reconciliation:
    superseded_epics: [44, 54, 75]
    superseded_standalone_issues: [42, 43]
    replacement_epic: 91
    replacement_issues: {A00: 92, A01: 93, A02: 94, A03: 95, A04: 96, A05: 97, A06: 98, A07: 99, A08: 100}
    status: complete
  non_goals:
    - Greenfield Python, Rust, or PyO3 rewrite.
    - Repository-local named-agent or Codex orchestration configuration.
    - Client-owned schedulers or persistence.
    - Distributed deployment or online self-modification.
  verification:
    focused_gate: >-
      uv run python tools/run_pytest.py
      tests/unit/test_alpha_plan.py::test_alpha_program_is_the_single_active_delivery_authority
