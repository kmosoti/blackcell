version: 2
project:
  key: BCP
  name: BlackCell
  description: World-model-driven, runtime-agnostic multiagent harness tooling.

principles:
  - Treat runtimes as adapters, not product identity.
  - Prefer OpenCode as the first-class local agent target.
  - Keep authentication user-local and out of repository/container state.
  - Keep install/check commands dry-run by default unless --apply is passed.
  - Keep generated project agent artifacts managed and digest-checked.

active_surfaces:
  cli:
    - blackcell world observe
    - blackcell world facts
    - blackcell nesy validate
    - blackcell harness plan
    - blackcell harness run --runtime dry-run
    - blackcell adapters list
    - blackcell doctor
    - blackcell agents list
    - blackcell agents render --target opencode --scope project
    - blackcell agents install --target opencode --scope project
    - blackcell agents check-drift --target opencode --scope project
    - blackcell agents doctor --target opencode --scope project
  packages:
    - blackcell.world
    - blackcell.nesy
    - blackcell.harness
    - blackcell.runtime
    - blackcell.agents
  generated:
    - .opencode/agents
    - .opencode/commands

verification:
  - uv run ruff format .
  - uv run ruff check .
  - uv run pytest
  - uv run ty check
  - uv run blackcell agents check-drift --target opencode --scope project
