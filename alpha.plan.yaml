schema_version: blackcell-alpha-plan/v1

program:
  id: blackcell-alpha
  status: in-progress
  accepted_on: "2026-07-22"
  branch: feature/repository-review-alpha
  base_revision: f2965ab3d1fe18357aae58042345a6a22e171203
  active_work_package: A08
  objective: >-
    Deliver a usable local BlackCell alpha whose CLI, TUI, and web views are clients of one
    durable project-work daemon, with explicit configuration, execution, review, verification,
    and replay boundaries.
  authority: Direct repository-owner instruction on 2026-07-22.
  supersedes:
    - repository-local named-agent and Codex orchestration configuration
    - the uncommitted human-gated product-proof delivery program
    - GitHub epic 75 and its greenfield Rust, PyO3, and custom-agent execution DAG

product:
  identity: CLI-first project-scoped agentic framework
  primary_loop:
    - capture explicit intent and constraints
    - inspect bounded project evidence
    - build and verify a dependency-safe plan
    - execute approved work in isolation
    - review independently from execution
    - verify declared outcomes from source evidence
    - retain replayable events and artifacts
  non_goals:
    - greenfield rewrite of the existing Python runtime
    - BlackCell-owned Rust or PyO3 configuration layer
    - repository-local assistant identities or model-selection policy
    - distributed scheduling, Kubernetes, or a visual workflow builder
    - online self-modification or automatic production deployment

architecture:
  authority:
    owner: daemon
    rule: CLI, TUI, and web clients never own scheduler, persistence, policy, or run state.
  daemon:
    process_model: foreground
    entrypoint_target: blackcell daemon foreground
    api_style: versioned typed HTTP plus an ordered event stream
    alpha_api_prefix: /api/alpha/v1
    owns:
      - project registry and configuration snapshots
      - intent, plan, run, review, verification, and replay records
      - scheduler leases, fencing, recovery, and provider dispatch
      - ordered client events and authoritative status
    supervision:
      strategy: operating-system service manager
      linux_default: systemd user service
      portable_fallback: documented foreground process
      forbidden:
        - double-fork daemonization
        - custom PID-file authority
        - a second scheduler embedded in a client
  clients:
    contract_rule: All clients consume the same closed alpha wire contracts; same-language projections share one typed client implementation.
    cli:
      role: complete automation and recovery surface
      output_default: json
      current_alpha_surface:
        - daemon status
        - POST /api/alpha/v1/projects
        - POST /api/alpha/v1/intents
        - POST /api/alpha/v1/plans
        - POST /api/alpha/v1/runs
        - POST /api/alpha/v1/runs/{run_id}/cancel
        - GET /api/alpha/v1/runs/{run_id}/status
        - GET /api/alpha/v1/runs/{run_id}/replay
        - GET /api/alpha/v1/events?after={cursor}
      prohibited:
        - submitting alpha work through /api/v1/runs
        - dispatching or executing queued alpha work before A04
    tui:
      framework: PyRatatui 0.2
      role: interactive projection over daemon state and commands
      concurrency: native terminal rendering stays on the event loop; client calls use bounded async tasks
    web:
      framework: Litestar
      role: browser projection over the same daemon contracts
      updates: channels and WebSockets consume the ordered daemon event stream
  project_configuration:
    provider: Kernform
    supported_version: "0.1.0"
    wire_schema: kernform.command/v1
    transport: argv-only subprocess
    version_probe: [kernform, --agent, --version]
    command_prefix: [kernform, --agent, --format, json]
    initial_commands: [check, init]
    prohibited_initial_commands: [inspect]
    reason_inspect_is_deferred: Its repository inventory can exceed the alpha adapter output budget.
    boundaries:
      - never import a sibling Kernform checkout or its Python or Rust internals
      - reject unsupported versions and schema values before applying artifacts
      - validate command-specific check and init result fields, semantics, and path bindings before exposing them to clients
      - use bounded stdout, stderr, and wall-clock budgets
      - preserve stable exit classes and diagnostic codes without parsing human prose
      - persist the invoked version, argv digest, result digest, and accepted artifacts
  legacy_runtime:
    component: DailyOperatorV2Workflow
    disposition: migration-and-replay-evidence-only
    rule: No new alpha CLI, TUI, web, or daemon command may invoke it.
    retained_for:
      - reading and replaying historical runtime-v1 records
      - extracting reusable event, policy, persistence, and recovery contracts

