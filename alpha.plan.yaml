      - controller admission now binds complete project, intent, plan, and run response content plus cross-linked replay identities and topological order before atomically replacing the selected project workflow projection
      - a separate exclusive workflow lane reads one canonical absolute no-follow regular JSON file of at most 1 MiB off the UI loop, clears the path immediately, decodes the selected closed request contract, and invokes only the injected project, intent, plan, or run controller method
      - the public shell renders bounded plain-text project and intent summaries, the accepted plan DAG, run state, replay artifact metadata, integrity findings, verification lifecycle, verdict, and evidence status, plus only the retained-checkout or reconciliation state present in current contracts
      - headless coverage proves project-through-run submission, replay projection, responsive run and event controls, and content-free rejection of missing, symlinked, empty, oversized, malformed, and operation-mismatched files; the six-node focused gate passed in 5.53 seconds on 2026-07-22
