  - id: A07
    title: Web projection and real-time events
    status: completed
    depends_on: [A05]
    issue_number: 99
    acceptance:
      - the web UI uses a closed contract-validating same-origin client and daemon authentication boundary
      - WebSocket reconnect resumes ordered events without polling mutable storage directly
    candidate_evidence:
      - an authenticated read-scope HTTP route exchanges the bearer credential for a bounded short-lived single-use WebSocket ticket while retaining only its digest and expiry
      - the read-only socket consumes its ticket before accept, validates a bounded cursor, and sends strict alpha event pages directly from AlphaRuntimeApiPort in durable global order
      - awaited sends, one disconnect receive, bounded polling, stable close codes, and a process-local connection cap prevent unbounded client backlog or polling load
