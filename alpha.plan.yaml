      - exact ticket, event-page, event, run, and replay bindings are checked before cursor advancement or display; response bytes, retained events, reconnect delay, identifiers, and safe DOM rendering are bounded
      - accessible status, replay, cancellation, and live ordered-event views clear credentials and projections on disconnect, page exit, or protocol failure
      - an accessible local-file intake sends project, intent, plan, and run contracts through the same in-memory authenticated client without retaining file content, file paths, or request objects
      - request bytes, closed keys, schemas, identifiers, digests, collections, node budgets, effects, repository paths, checks, DAG topology, and writer ordering fail locally before transport while the daemon remains final admission authority
      - accepted project, intent, plan, and run responses must match the submitted identities and content before plain-text display; a run response selects the inspector only after that binding passes
      - replacement connection, disconnect, page teardown, validation failure, and abort clear the file control and workflow projection without leaking submitted JSON
    remaining: []
  - id: A08
    title: Real-project proof and alpha freeze
