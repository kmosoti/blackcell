test_strategy:
  ordinary_iteration:
    - run only exact affected pytest nodes with --blackcell-require-all-pass
    - run Ruff check and format check only on changed Python paths
    - run one pytest process at a time
  milestone_gate: uv run ruff check .
  ci_owned:
    - complete pytest coverage gate
    - repository-wide type check
    - broad compatibility matrix
  local_full_suite_rule: Run only for a release or publication request, or when focused evidence cannot bound the change.

verification:
  focused_gate: >-
    uv run python tools/run_pytest.py
    tests/unit/test_alpha_plan.py::test_alpha_program_is_the_single_active_delivery_authority
    tests/unit/test_alpha_plan.py::test_alpha_architecture_has_one_daemon_and_explicit_client_boundaries
    tests/unit/test_alpha_plan.py::test_alpha_work_package_dag_is_acyclic_and_has_one_active_node
    tests/unit/test_alpha_plan.py::test_alpha_plan_enforces_the_fast_development_loop
    tests/unit/test_alpha_plan.py::test_canonical_files_reference_alpha_and_remove_stale_delivery_programs
    tests/unit/test_docs_graph.py::test_docs_graph_entrypoints_exist
    tests/unit/test_docs_graph.py::test_docs_graph_nodes_have_frontmatter
    tests/unit/test_docs_graph.py::test_docs_graph_map_links_canonical_nodes
    tests/unit/test_docs_graph.py::test_decision_atlas_records_every_adr_node
    tests/unit/test_docs_graph.py::test_readme_local_links_and_recorded_quickstart_are_maintained
    tests/unit/test_refactor_consolidation_plan.py::test_blackcell_plan_declares_the_project_program_and_historical_context
    tests/unit/test_daemon_cli.py::test_daemon_status_reports_runtime_readiness
    tests/unit/test_daemon_cli.py::test_daemon_status_uses_environment_endpoint_and_fails_when_not_ready
    tests/unit/test_daemon_cli.py::test_daemon_help_exposes_status_without_legacy_submission
    tests/unit/test_runtime_http_client.py::test_status_decodes_public_health_contracts_and_not_ready_state
    tests/unit/test_runtime_http_client.py::test_client_rejects_malformed_or_remote_plaintext_endpoints
    tests/unit/test_runtime_http_client.py::test_client_accepts_remote_https_and_loopback_http
    tests/unit/test_runtime_http_client.py::test_client_failures_are_typed_bounded_and_content_free
    tests/unit/test_runtime_http_client.py::test_stdlib_transport_bounds_responses_and_connection_failures
    -q --blackcell-require-all-pass
  project_gate: uv run ruff check .

