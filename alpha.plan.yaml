      - Canonical documents and blackcell.plan.yaml point to this alpha plan.
      - The daemon CLI cannot submit work to DailyOperatorV2Workflow.
      - The obsolete GitHub programs are reconciled after local verification.
    candidate_evidence:
      - AGENTS.md is the only repository-local assistant configuration and the stale .agents and .codex trees are absent
      - obsolete product-proof and scope-realignment artifacts are absent while canonical scope, architecture, and delivery files point to this alpha plan
      - the daemon and alpha CLI surfaces do not expose legacy /api/v1 run submission or invoke DailyOperatorV2Workflow
      - superseded GitHub programs are closed not planned and native replacement epic 91 retains the verified child and dependency graph
    remaining: []
  - id: A01
    title: Daemon client and service lifecycle
    status: completed
    depends_on: [A00]
    issue_number: 93
    existing_foundation:
      - blackcell-runtime foreground API and worker processes
      - public liveness and readiness routes
      - bounded daemon status HTTP client
    acceptance:
      - foreground, install, start, stop, restart, status, and logs have typed outcomes
      - systemd user supervision is optional and never becomes runtime state authority
      - restart and recovery preserve one scheduler and one data root
    candidate_evidence:
      - blackcell daemon foreground delegates to the canonical runtime entry point while status uses the bounded authenticated health client
      - install, start, stop, restart, status, and bounded logs use typed systemd user-service results without PID-file or implicit start authority
      - one foreground daemon supervises the API plus only explicitly configured execution, review, and verification children against shared repository and data roots
      - sibling exit and bounded graceful or forced shutdown are tested, and no configuration path starts the historical V2 worker
    remaining: []
  - id: A02
    title: Kernform project configuration boundary
    status: completed
    depends_on: [A00]
    issue_number: 94
    acceptance:
      - project check and init use the pinned agent-mode command contract
      - unsupported versions, oversized output, timeouts, and malformed envelopes fail closed
      - accepted artifacts are bounded to the requested project root
    candidate_evidence:
      - the argv-only adapter probes and requires Kernform 0.1.0, then invokes only the closed kernform.command/v1 agent JSON check and init commands
      - direct subprocess capture bounds stdout, stderr, wall time, token, diagnostic, capability, and artifact counts with stable content-free failures
      - check and init preserve exact invocation evidence, reject schema, version, exit, truncation, and stderr drift, and canonicalize every returned artifact inside the requested project root
      - closed check and init result contracts reject unknown fields, malformed catalog and plan identities, invalid conformance relationships, duplicate or unsorted requirements, unbounded counts, mismatched artifact references, and result-path escapes
      - a disposable read-only integration probe against the current Kernform 0.1.0 Python/Rust checkout initialized a 64-operation API/web project and then validated all 39 managed files as conformant through the production BlackCell adapter
      - the JSON-first project CLI exposes only check and init, preserves Kernform failure exit classes, and accepts an explicit executable boundary
    remaining: []
  - id: A03
    title: Alpha intent, plan, run, and event contracts
    status: completed
    depends_on: [A01, A02]
    issue_number: 95
    acceptance:
      - /api/alpha/v1 has strict versioned contracts and one ordered event stream
      - a run is asynchronous and never calls the legacy synchronous run route
      - replay can reconstruct accepted intent and plan state without live providers
    candidate_evidence:
      - immutable project, intent, plan, and queued-run streams use the existing event ledger
      - exact duplicate, restart, cursor-resume, HTTP 202, and live-free replay nodes pass locally
      - accepted plans bind an exact Git base commit and per-node repository path authority
    remaining: []
  - id: A04
    title: Provider boundary and isolated execution
    status: completed
    depends_on: [A03]
    issue_number: 96
    acceptance:
      - providers receive bounded evidence without ambient execution authority
      - mutating work runs in a recoverable isolated worktree with path and effect budgets
      - leases, fencing, cancellation, and reconciliation are observable and tested
    candidate_evidence:
      - immutable lease and policy inputs derive one deterministic local branch and worktree path
      - inspection counts base-relative committed changes and all untracked files against path budgets
      - failure retains an existing checkout while explicit clean successful removal preserves the local branch
      - bounded content-addressed evidence gives the proposal provider no repository path, mutable checkout, or tool authority
      - a closed create/replace/delete proposal is bound to the exact evidence digest and gateway budgets
      - the provider-facing JSON schema now requires at least one operation before the stricter host domain parser runs; the one live rejection that exposed the gap was preserved without redispatch
      - the host-owned text executor preflights every effect, rejects symlinks and stale content, rolls back caught partial failure, and verifies the exact worktree delta
      - append-only claim and preparation events bind attempts, monotonic fencing tokens, workers, expiries, exact worktree specs, and clean inspections
      - typed idempotent cancellation closes queued work immediately and retains an active checkout until the exact fenced worker acknowledges stop
      - explicit startup reconciliation requeues only missing or unchanged checkouts that have not crossed the provider-dispatch boundary; changed, uninspectable, or provider-ambiguous work becomes reconciliation-required
      - the Linux acceptance backend fails closed unless Bubblewrap proves distinct mount, PID, IPC, UTS, cgroup, and network namespaces through its dedicated JSON status channel
      - direct argv resolves only host-allowlisted canonical executables; the worktree and explicit runtime roots are read-only, Git metadata and ambient host trees are absent, and no shell or host network is available
      - fixed environment, temporary-filesystem, address-space, CPU, process, file, wall-clock, stdout, and stderr limits produce content-free typed infrastructure failures
      - cooperative cancellation tears down the Bubblewrap process tree, and exact before/after Git inspections reject any project-state drift while bounded stream bytes retain exact digests and lengths
      - every acceptance check declares repository-read and process effects, and every repository writer additionally declares bounded path authority
      - accepted repository writers form one dependency-ordered chain, so alpha rejects divergent implicit merge semantics
      - the host commits admitted changes with fixed identity, disabled hooks and signing, ignored global and system Git configuration, and bounded direct argv
      - node success binds the exact clean policy-compliant inspection and final Git head, reports the successful checkout as retained, and survives live-free replay
      - durable cleanup intent precedes successful-checkout removal; completed or failed evidence survives restart, preserves the local branch and commit, and updates retained-checkout truth without rewriting the run outcome
      - the closed worker policy bounds globally retained successful checkouts by durable success order, recovers pending cleanup before dispatch, and stops new work while the configured count cannot be satisfied
      - each later checkout derives its base from the latest successful writer in its dependency ancestry, or from the accepted plan base when no writer precedes it
      - queued-run discovery follows durable global event order rather than lexical run identifiers
      - the host evidence collector reads only admitted regular UTF-8 files, excludes Git metadata and links, and enforces 64-file, per-file, and total-byte limits before provider invocation
      - one injected bootstrap worker claims the first dependency-ready node, invokes the proposal and text-effect ports only for repository writers, and runs every declared check through the injected isolation boundary
      - context, proposal, provider metadata, admitted effects, raw bounded check streams, typed check results, and terminal manifests are content-addressed before a lifecycle event references them
      - one strict pre-dispatch event binds the exact fenced worker, deterministic provider request ID, and already-stored canonical context; restart after that marker never auto-requeues the provider call
      - success, stable failure, and cooperative cancellation bind the terminal outcome digest when storage succeeds; cancellation retains completed partial stages and closes the pre-success race
      - check-only nodes bypass provider and mutation ports while executing from the latest successful dependency-writer head
      - the daemon starts API-only when alpha configuration is absent and never auto-starts the historical V2 worker
      - one owner-only closed JSON contract outside the repository fixes the CODE profile, model, remote locality, classification, provider environment names, executable identities, isolation roots, aliases, and resource bounds before child spawn
      - the configured alpha worker shares the canonical ledger and artifact store, reconciles startup before dispatch, honors storage headroom, and polls only when idle or fenced by a competitor
      - pinned Codex and Git argv plus a denylisted explicit environment allowlist keep canonical provider input on stdin and exclude the daemon API token and ambient process configuration
    remaining: []
  - id: A05
    title: Review, verification, and replay
    status: completed
    depends_on: [A04]
    issue_number: 97
    acceptance:
      - review and verification are separate from the executor and from each other
      - findings bind claims to source evidence and cannot weaken acceptance checks
      - run replay is live-free and detects missing or changed artifacts
    candidate_evidence:
      - alpha-replay/v2 re-folds the event grammar before bounded artifact reads and invokes no provider, executor, acceptance runner, or worktree effect
      - alpha-node-outcome/v2 binds canonical context, proposal, provider, effect, exact acceptance command, result, stdout, and stderr artifacts to the durable lease and plan
      - replay reports verified, failed, inconclusive, or not-applicable with stable findings and a deterministic evidence digest while exposing no artifact content
      - missing metadata, changed bytes, noncanonical JSON, unsupported schemas, and source-binding mismatches are distinguished from unavailable storage or absent terminal evidence
      - the API and configured alpha worker open the same database-backed artifact store and configured isolation root, so completed runs replay identically after restart
      - a bounded host-owned review context binds the accepted objective, constraints, dependency graph, path and effect scope, exact check argv and expected exits, result identities, and replay evidence digests
      - REVIEW gateway calls receive only immutable source and command excerpts with host-derived evidence IDs and no tools; their closed output can propose cited findings but cannot approve, self-admit, or rewrite acceptance
      - deterministic structural admission rejects context drift, invented evidence, out-of-range citations, duplicate identities, unknown fields, and the fixed correctness and reward-hacking taxonomy
      - a separate alpha review stream claims the exact successful execution event with an immutable run-state and artifact-evidence snapshot, monotonic attempt and fence, worker identity, and expiry
      - review provider dispatch is durably fenced by a deterministic request ID plus acceptance and context artifact digests; success binds proposal, provider-result, and admitted-review artifacts without asserting approval or verification
      - restart requeues only a pre-dispatch review claim under a new fence, while a post-dispatch restart becomes reconciliation-required and can never auto-redispatch
      - review preparation reuses the live-free artifact verifier and accepts only a fully verified successful execution graph; no provider, executor, acceptance runner, worktree, or network port is present
      - the prepared acceptance snapshot binds accepted project, intent, plan, DAG, effects, paths, exact check commands, expected exits, result identities, pass state, and base revision
      - complete bounded source-before, source-after, effect, outcome, command, result, stdout, and stderr evidence receives host-derived artifact, node, path or check, and line identities; oversize and aggregate overflow fail closed without truncation or omission
      - the review-only worker has exactly execution-source, fenced scheduler, artifact-store, and REVIEW-provider ports; it contains no executor, acceptance runner, worktree, shell, or network-effect authority
      - successful execution candidates bind the terminal execution snapshot independently of later successful-worktree cleanup, are revalidated after claim, and store canonical review context before provider dispatch
      - proposal, provider-result, and structurally admitted review artifacts commit before success; preparation, provider, admission, artifact, persistence, and stale-fence failures remain stable and content-free
      - completed review is never selected twice after process reconstruction, and a crash after dispatch remains ambiguous for supervisor reconciliation rather than repeating REVIEW
      - an owner-only closed JSON contract outside the repository explicitly fixes a distinct REVIEW profile, model, remote locality, classification, token/cost/latency budgets, canonical Codex and Git executables, environment names, reviewer and supervisor identities, lease, and poll interval
      - the review foreground process validates provider boundaries before storage, reconciles as the supervisor, dispatches as the reviewer, honors storage headroom, and can be enabled as a daemon child independently of execution without starting V2
      - concrete execution-source, reviewer-transition, and write-only artifact facades keep reconciliation, worktree mutation, and artifact-read authority outside the review coordinator object graph
      - the deterministic verifier binds objective, constraints, nodes, write scopes, exact checks, and review policy into an excerpt-free intent-to-evidence matrix whose rows carry only criterion, evidence, and finding identities
      - complete host outcome, source/effect, and command/result/stdout/stderr coverage plus a clear review passes; failed checks, unresolved findings, or check-artifact identity drift fail; missing or duplicate required evidence is inconclusive
      - a separate verification stream binds the exact successful execution and review events, full review artifact chain, replay identities, and finding count under monotonic verifier attempts and fencing tokens
      - completed pass, fail, or inconclusive verdicts bind report and matrix digests, while verifier-error is a distinct terminal state and incomplete pure verification can be safely requeued without an external-dispatch ambiguity
      - successful-review discovery follows durable event order without reading artifacts before claim; preparation then revalidates the immutable candidate and reconstructs the execution context through live-free replay
      - canonical context, proposal, provider-result, and admitted-review bytes are checked against exact media types, digests, bindings, deterministic admission, and finding count before verification
      - the verifier-only worker has exactly immutable verification-source, fenced scheduler, write-only artifact, and deterministic-verifier ports, commits the canonical report before completion, and never selects a completed verdict again after restart
      - source, verifier, report-artifact, and persistence faults become stable content-free verifier-error outcomes, while pass, fail, and inconclusive remain completed verdicts
      - an owner-only closed verifier contract outside the repository fixes distinct verifier and verification-supervisor identities, lease duration, and polling cadence without model or executable authority
      - the foreground verifier process reconciles only as the supervisor, runs through narrow source, transition, report-write, and deterministic-verifier facades, honors shared storage headroom, and supports diagnostic once mode
      - the daemon validates and starts alpha-verify-worker only when explicitly configured, including verify-only composition, and never infers it from execution or review configuration
      - alpha-replay/v2 includes a closed verification projection that re-folds the verifier stream, revalidates exact execution and successful-review source events, and reads no live repository or worktree state
      - completed verdict replay requires one canonical report whose content address, media type, closed schema, candidate bindings, verdict, and matrix digest match the durable stream
      - not-started, claimed, requeued, completed, and verifier-error states remain distinct; a report stored before verifier-error is checked without converting the error into a verdict
      - report tamper, missing metadata, invalid JSON or schema, noncanonical bytes, binding drift, and unavailable storage produce stable content-free integrity findings and one deterministic verification evidence digest
      - a real execution-to-review-to-verification acceptance chain admits a source-cited hidden-shortcut finding, preserves its non-approval semantics, produces a completed fail verdict, and replays it after restart
      - reviewer provider failure persists without redispatch or a verification verdict, while verifier failure persists and replays as verifier-error with no verdict after restart
    remaining: []
  - id: A06
    title: PyRatatui TUI
    status: completed
    depends_on: [A05]
    issue_number: 98
    acceptance:
      - the TUI uses the shared typed client and non-blocking workers
      - reconnect resumes from an event cursor without creating another authority
    candidate_evidence:
      - one strict authenticated RuntimeHttpClient covers project registration, intent and plan acceptance, run submission, status, cancellation, replay, and ordered event pages
      - JSON-first blackcell alpha commands expose the complete typed automation surface and accept mutation contracts only through bounded regular JSON files
      - client credentials come only from the existing environment or owner-only token-file boundary, remain redacted, and never appear as command arguments
      - the shared client rejects malformed identifiers and pagination, remote plaintext endpoints, redirects, oversized bodies, unexpected media types, and invalid response contracts with bounded typed failures
      - a framework-neutral asynchronous controller offloads every synchronous client operation, serializes event refresh, validates response bindings and cursor monotonicity, and retains a bounded immutable projection
      - project, intent, plan, submit, status, cancel, replay, and event operations are available to a thin interactive shell without scheduler, persistence, provider, worktree, credential, or legacy-runtime authority
      - optional cursor checkpoints use canonical owner-only atomic files keyed by hashed endpoint identity and bind the last visible alpha event without retaining credentials or endpoint text
      - reconnect validates the stored ledger position and event witness through the shared client before adoption, while refresh persists before in-memory advancement so failure can replay but never skip events
      - a public PyRatatui shell projects connection state, bounded ordered events, and run status, replay, and cancellation exclusively through AlphaTuiController with service values rendered as bounded plain text
